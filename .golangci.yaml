# [v2.10.1] https://golangci-lint.run/docs/linters/configuration/
version: "2"
run:
  go: "1.25"
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - durationcheck
    - dupword
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - ginkgolinter
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - godot
    - goprintffuncname
    - gosec
    - govet
    - iface
    - inamedparam
    - ineffassign
    - intrange
    - loggercheck
    - makezero
    - mirror
    - misspell
    - mnd
    - nestif
    - nilerr
    - nilnesserr
    - noctx
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - testifylint
    - testpackage
    - thelper
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - zerologlint
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
    godot:
      scope: toplevel
      capital: true
      period: true
      exclude:
        - "SPDX-License-Identifier"
        - "\\+groupName="
    gosec:
      severity: medium
      confidence: medium
      config:
        global:
          nosec: true
    govet:
      enable-all: true
    misspell:
      locale: US
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    revive:
      severity: warning
      rules:
        - name: bool-literal-in-expr
        - name: call-to-gc
        - name: confusing-results
        - name: context-keys-type
        - name: datarace
        - name: deep-exit
        - name: defer
        - name: early-return
        - name: empty-block
        - name: epoch-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: forbidden-call-in-wg-go
        - name: get-return
        - name: identical-branches
        - name: identical-ifelseif-branches
        - name: identical-ifelseif-conditions
        - name: identical-switch-branches
        - name: identical-switch-conditions
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: inefficient-map-lookup
        - name: line-length-limit
          arguments:
            - 140
        - name: max-control-nesting
        - name: modifies-parameter
        - name: modifies-value-receiver
        - name: nested-structs
        - name: package-directory-mismatch
        - name: redundant-build-tag
        - name: redundant-import-alias
        - name: superfluous-else
        - name: time-date
        - name: time-equal
        - name: time-naming
        - name: unchecked-type-assertion
          arguments:
            - acceptIgnoredAssertionResult: true
        - name: unconditional-recursion
        - name: unexported-naming
        - name: unexported-return
        - name: unnecessary-format
        - name: unnecessary-if
        - name: unnecessary-stmt
        - name: unsecure-url-scheme
        - name: unused-receiver
        - name: use-any
        - name: use-errors-new
        - name: use-fmt-print
        - name: use-slices-sort
        - name: use-waitgroup-go
        - name: useless-break
        - name: useless-fallthrough
        - name: var-declaration
  exclusions:
    generated: lax
    presets:
      - std-error-handling
    rules:
      # gosec: test code uses insecure TLS/SSH configs by design.
      - linters:
          - gosec
        path: _test\.go
    paths:
      - vendor/.*
      - zz_generated\.deepcopy\.go
formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - blank
        - localmodule
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - vendor/.*
      - zz_generated\.deepcopy\.go
